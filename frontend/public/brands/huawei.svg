<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Huawei - 8 petal flower -->
  <g fill="currentColor">
    <!-- Center circle -->
    <circle cx="50" cy="50" r="8"/>

    <!-- Petal 1 - Top -->
    <ellipse cx="50" cy="20" rx="6" ry="12" transform="rotate(0 50 50)"/>
    <!-- Petal 2 - Top-right -->
    <ellipse cx="65" cy="25" rx="6" ry="12" transform="rotate(45 50 50)"/>
    <!-- Petal 3 - Right -->
    <ellipse cx="80" cy="50" rx="6" ry="12" transform="rotate(90 50 50)"/>
    <!-- Petal 4 - Bottom-right -->
    <ellipse cx="65" cy="75" rx="6" ry="12" transform="rotate(135 50 50)"/>
    <!-- Petal 5 - Bottom -->
    <ellipse cx="50" cy="80" rx="6" ry="12" transform="rotate(180 50 50)"/>
    <!-- Petal 6 - Bottom-left -->
    <ellipse cx="35" cy="75" rx="6" ry="12" transform="rotate(225 50 50)"/>
    <!-- Petal 7 - Left -->
    <ellipse cx="20" cy="50" rx="6" ry="12" transform="rotate(270 50 50)"/>
    <!-- Petal 8 - Top-left -->
    <ellipse cx="35" cy="25" rx="6" ry="12" transform="rotate(315 50 50)"/>
  </g>
</svg>
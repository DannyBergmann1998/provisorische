<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 64" preserveAspectRatio="xMidYMid meet">
  <!-- Amazon Pay Official Logo -->

  <!-- White background -->
  <rect width="140" height="64" fill="white" rx="4"/>

  <!-- Amazon text (black) -->
  <text x="18" y="35" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#000000">amazon</text>

  <!-- Pay text (orange) -->

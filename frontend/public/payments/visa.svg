<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 64" preserveAspectRatio="xMidYMid meet">
  <!-- Visa Official Logo -->

  <!-- White background -->
  <rect width="100" height="64" fill="white" rx="4"/>

  <!-- Blue bar (signature element) -->
  <rect x="15" y="18" width="5" height="28" fill="#1A1F71" rx="1"/>

  <!-- VISA wordmark in official blue -->
  <text x="50" y="42" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1A1F71" text-anchor="middle" letter-spacing="2">VISA</text>
</svg>

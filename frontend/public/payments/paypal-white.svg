<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 64" preserveAspectRatio="xMidYMid meet">
  <!-- PayPal Official Logo - Authentic Design -->

  <!-- Blue Circle (PayPal signature element) -->
  <circle cx="22" cy="32" r="13" fill="#003087" stroke="none"/>

  <!-- White accent in circle (upper left) -->
  <circle cx="18" cy="28" r="3" fill="white" opacity="0.9"/>

  <!-- PayPal Wordmark - Official Font -->
  <text x="65" y="40" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#003087" letter-spacing="0.3">PayPal</text>
</svg>

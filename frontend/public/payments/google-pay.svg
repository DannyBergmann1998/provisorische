<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 64" preserveAspectRatio="xMidYMid meet">
  <!-- Google Pay Official Logo -->

  <!-- White background -->
  <rect width="140" height="64" fill="white" rx="4"/>

  <!-- G (Google Blue) -->
  <text x="20" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#4285F4">G</text>

  <!-- Pay (Black) -->
  <text x="65" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#000000">Pay</text>
</svg>
